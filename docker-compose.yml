version: "3.8"
services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: sparkocr-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set local http://minio:9000 minio minio12345;
      /usr/bin/mc mb -p local/sparkocr-bronze || true;
      /usr/bin/mc mb -p local/sparkocr-silver || true;
      exit 0;
      "

volumes:
  minio_data:
